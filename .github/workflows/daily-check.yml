name: Daily university notice check

on:
  schedule:
    # 09:00 and 19:00 KST, Monday through Friday.
    - cron: "0 0 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Send a Telegram test message instead of running the watcher"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - success
          - empty

permissions:
  contents: read

concurrency:
  group: university-notice-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-window:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.calendar.outputs.should_run }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Enforce the KST weekday run window
        id: calendar
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          should_run="$(python university-course-watcher/src/schedule_policy.py --event "${EVENT_NAME}")"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "Run-window decision for ${EVENT_NAME}: ${should_run}"

  course-check:
    needs: run-window
    permissions:
      contents: write
    if: needs.run-window.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Refresh durable course state from the branch
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout "origin/${GITHUB_REF_NAME}" -- \
            university-course-watcher/data/university_history.csv \
            university-course-watcher/data/seen_urls.json \
            university-course-watcher/data/notice_state.json \
            university-course-watcher/data/course_delivery_outbox.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: university-course-watcher/requirements.lock
      - name: Restore course HTTP response cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: university-course-watcher/data/course_http_state.json
          key: course-http-${{ github.run_id }}
          restore-keys: |
            course-http-
      - name: Install Korean OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-kor
      - name: Install dependencies
        run: python -m pip install --require-hashes -r university-course-watcher/requirements.lock
      - name: Validate Telegram secrets are configured
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests
          missing = [name for name in ("TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID") if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          response = requests.get(f"https://api.telegram.org/bot{token}/getMe", timeout=10)
          if not response.ok or not response.json().get("ok"):
              raise SystemExit("Telegram bot token validation failed.")
          print("Telegram secrets are configured and bot token is valid.")
          PY
      - name: Send Telegram smoke test message
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test != 'none'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests
          response = requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "[University Course Watcher] GitHub Actions Telegram smoke test passed.",
                  "disable_web_page_preview": True,
              },
              timeout=10,
          )
          if not response.ok or not response.json().get("ok"):
              raise SystemExit("Telegram smoke test message failed.")
          print("Telegram smoke test message sent.")
          PY
      - name: Run course watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: "false"
          TIMEZONE: Asia/Seoul
          NOTICE_MAX_AGE_DAYS: "7"
          PDF_MAX_PAGES: "8"
          DELIVERY_STATE_PUSH_ENABLED: "true"
        run: |
          cd university-course-watcher
          if [ "${{ github.event.inputs.telegram_test }}" = "success" ]; then
            python main.py --telegram-test-success
          elif [ "${{ github.event.inputs.telegram_test }}" = "empty" ]; then
            python main.py --telegram-test-empty
          else
            python main.py --once
          fi
      - name: Upload course results
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test == 'none'))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: course-watcher-results
          if-no-files-found: error
          retention-days: 14
          path: |
            university-course-watcher/data/results.csv
            university-course-watcher/data/results.json
            university-course-watcher/data/report.html
            university-course-watcher/data/university_history.csv
            university-course-watcher/data/seen_urls.json
            university-course-watcher/data/notice_state.json
            university-course-watcher/data/course_delivery_outbox.json

  graduate-admission-check:
    needs:
      - run-window
      - publish-course-results
    if: always() && needs.run-window.outputs.should_run == 'true' && (needs.publish-course-results.result == 'success' || needs.publish-course-results.result == 'skipped') && (github.event_name != 'workflow_dispatch' || github.event.inputs.telegram_test == 'none')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Refresh durable graduate state from the branch
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout "origin/${GITHUB_REF_NAME}" -- \
            university-course-watcher/data/seen_graduate_admission_urls.json \
            university-course-watcher/data/graduate_admission_summary_state.json \
            university-course-watcher/data/graduate_delivery_outbox.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: university-course-watcher/requirements.lock
      - name: Install dependencies
        run: python -m pip install --require-hashes -r university-course-watcher/requirements.lock
      - name: Restore graduate HTTP response cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: university-course-watcher/data/graduate_http_state.json
          key: graduate-http-${{ github.run_id }}
          restore-keys: |
            graduate-http-
      - name: Run graduate admission watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: "false"
          TIMEZONE: Asia/Seoul
          NOTICE_MAX_AGE_DAYS: "7"
          PDF_MAX_PAGES: "8"
          DELIVERY_STATE_PUSH_ENABLED: "true"
        run: |
          cd university-course-watcher
          python main.py --once --watch graduate-admission --region seoul
      - name: Upload graduate admission results
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: graduate-admission-results
          if-no-files-found: error
          retention-days: 14
          path: |
            university-course-watcher/data/graduate_admission_results.csv
            university-course-watcher/data/graduate_admission_results.json
            university-course-watcher/data/graduate_admission_report.html
            university-course-watcher/data/seen_graduate_admission_urls.json
            university-course-watcher/data/graduate_admission_summary_state.json
            university-course-watcher/data/graduate_delivery_outbox.json

  notify-failure:
    needs:
      - course-check
      - graduate-admission-check
      - publish-course-results
      - publish-graduate-admission-results
    if: always() && (failure() || cancelled())
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send failure alert to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl --fail-with-body -sS --connect-timeout 10 --max-time 30 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d disable_web_page_preview=true \
            --data-urlencode text="[감시 실행 실패] 오늘 점검 워크플로가 실패해 알림이 누락될 수 있습니다. 로그: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  publish-course-results:
    needs: course-check
    permissions:
      contents: write
    concurrency:
      group: watcher-report-publish-${{ github.ref }}
      cancel-in-progress: false
    if: always() && (needs.course-check.result == 'success' || needs.course-check.result == 'failure') && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test == 'none'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download course results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: course-watcher-results
          path: university-course-watcher/data
      - name: Commit latest course report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            university-course-watcher/data/results.csv \
            university-course-watcher/data/results.json \
            university-course-watcher/data/report.html \
            university-course-watcher/data/university_history.csv \
            university-course-watcher/data/seen_urls.json \
            university-course-watcher/data/notice_state.json \
            university-course-watcher/data/course_delivery_outbox.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update latest course watcher report [skip ci]"
            for attempt in 1 2 3; do
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase -X theirs "origin/${GITHUB_REF_NAME}"
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after remote refresh."
              sleep 2
            done
            echo "Failed to publish report files after 3 attempts."
            exit 1
          fi
      - name: Upload published course result artifacts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-course-watcher-results
          if-no-files-found: error
          retention-days: 14
          path: |
            university-course-watcher/data/results.csv
            university-course-watcher/data/results.json
            university-course-watcher/data/report.html
            university-course-watcher/data/university_history.csv
            university-course-watcher/data/seen_urls.json
            university-course-watcher/data/notice_state.json
            university-course-watcher/data/course_delivery_outbox.json

  publish-graduate-admission-results:
    needs: graduate-admission-check
    permissions:
      contents: write
    concurrency:
      group: watcher-report-publish-${{ github.ref }}
      cancel-in-progress: false
    if: always() && (needs.graduate-admission-check.result == 'success' || needs.graduate-admission-check.result == 'failure') && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test == 'none'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Download graduate admission results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: graduate-admission-results
          path: university-course-watcher/data
      - name: Commit latest graduate admission report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            university-course-watcher/data/graduate_admission_results.csv \
            university-course-watcher/data/graduate_admission_results.json \
            university-course-watcher/data/graduate_admission_report.html \
            university-course-watcher/data/seen_graduate_admission_urls.json \
            university-course-watcher/data/graduate_admission_summary_state.json \
            university-course-watcher/data/graduate_delivery_outbox.json
          if git diff --cached --quiet; then
            echo "No graduate admission report changes to commit."
          else
            git commit -m "Update latest graduate admission report [skip ci]"
            for attempt in 1 2 3; do
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase -X theirs "origin/${GITHUB_REF_NAME}"
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after remote refresh."
              sleep 2
            done
            echo "Failed to publish graduate admission report files after 3 attempts."
            exit 1
          fi
      - name: Upload published graduate admission artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-graduate-admission-results
          if-no-files-found: error
          retention-days: 14
          path: |
            university-course-watcher/data/graduate_admission_results.csv
            university-course-watcher/data/graduate_admission_results.json
            university-course-watcher/data/graduate_admission_report.html
            university-course-watcher/data/seen_graduate_admission_urls.json
            university-course-watcher/data/graduate_admission_summary_state.json
            university-course-watcher/data/graduate_delivery_outbox.json
