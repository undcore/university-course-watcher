name: Daily university notice check

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r university-course-watcher/requirements.txt
      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: "false"
          TIMEZONE: Asia/Seoul
        run: cd university-course-watcher && python main.py --once
      - name: Upload result artifacts
        uses: actions/upload-artifact@v4
        with:
          name: university-course-watcher-results
          path: |
            university-course-watcher/data/results.csv
            university-course-watcher/data/results.json
            university-course-watcher/data/report.html
