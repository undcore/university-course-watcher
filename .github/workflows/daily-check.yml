name: Daily university notice check

on:
  push:
    branches:
      - main
      - codex/add-course-watcher-project
  schedule:
    # 09:00 and 19:00 KST, Monday through Friday.
    - cron: "0 0 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Send a Telegram test message instead of running the watcher"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - success
          - empty

permissions:
  contents: write

jobs:
  course-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: university-course-watcher/requirements.txt
      - name: Restore seen URL cache
        uses: actions/cache@v5
        with:
          path: |
            university-course-watcher/data/seen_urls.json
            university-course-watcher/data/course_http_state.json
          key: seen-urls-${{ github.run_id }}
          restore-keys: |
            seen-urls-
      - name: Install dependencies
        run: pip install -r university-course-watcher/requirements.txt
      - name: Validate Telegram secrets are configured
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests
          missing = [name for name in ("TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID") if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          response = requests.get(f"https://api.telegram.org/bot{token}/getMe", timeout=10)
          if not response.ok or not response.json().get("ok"):
              raise SystemExit("Telegram bot token validation failed.")
          print("Telegram secrets are configured and bot token is valid.")
          PY
      - name: Send Telegram smoke test message
        if: github.event_name == 'push' && contains(github.event.head_commit.message, '[telegram-smoke]')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests
          response = requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "[University Course Watcher] GitHub Actions Telegram smoke test passed.",
                  "disable_web_page_preview": True,
              },
              timeout=10,
          )
          if not response.ok or not response.json().get("ok"):
              raise SystemExit("Telegram smoke test message failed.")
          print("Telegram smoke test message sent.")
          PY
      - name: Run course watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: "false"
          TIMEZONE: Asia/Seoul
          NOTICE_MAX_AGE_DAYS: "7"
          PDF_MAX_PAGES: "8"
          REPORT_HTML_URL: https://htmlpreview.github.io/?https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/university-course-watcher/data/report.html
        run: |
          cd university-course-watcher
          if [ "${{ github.event.inputs.telegram_test }}" = "success" ]; then
            python main.py --telegram-test-success
          elif [ "${{ github.event.inputs.telegram_test }}" = "empty" ]; then
            python main.py --telegram-test-empty
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.event.head_commit.message }}" != *"[full-run]"* ]]; then
            python main.py --once --dry-run --region incheon --grade A --smoke-test
          else
            python main.py --once
          fi
      - name: Upload course results
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test == 'none') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-run]'))
        uses: actions/upload-artifact@v7
        with:
          name: course-watcher-results
          path: |
            university-course-watcher/data/results.csv
            university-course-watcher/data/results.json
            university-course-watcher/data/report.html

  graduate-admission-check:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.telegram_test == 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: university-course-watcher/requirements.txt
      - name: Install dependencies
        run: pip install -r university-course-watcher/requirements.txt
      - name: Restore notification history
        uses: actions/cache@v5
        with:
          path: |
            university-course-watcher/data/seen_graduate_admission_urls.json
            university-course-watcher/data/graduate_http_state.json
          key: graduate-admission-seen-${{ github.run_id }}
          restore-keys: |
            graduate-admission-seen-
      - name: Run graduate admission watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG: "false"
          TIMEZONE: Asia/Seoul
          NOTICE_MAX_AGE_DAYS: "7"
          PDF_MAX_PAGES: "8"
        run: |
          cd university-course-watcher
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.event.head_commit.message }}" != *"[full-run]"* ]]; then
            python main.py --once --watch graduate-admission --dry-run --region seoul --smoke-test
          else
            python main.py --once --watch graduate-admission --region seoul
          fi
      - name: Upload graduate admission results
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[full-run]')
        uses: actions/upload-artifact@v7
        with:
          name: graduate-admission-results
          path: |
            university-course-watcher/data/graduate_admission_results.csv
            university-course-watcher/data/graduate_admission_results.json

  publish-results:
    needs:
      - course-check
      - graduate-admission-check
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_test == 'none') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-run]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Download course results
        uses: actions/download-artifact@v8
        with:
          name: course-watcher-results
          path: university-course-watcher/data
      - name: Download graduate admission results
        uses: actions/download-artifact@v8
        with:
          name: graduate-admission-results
          path: university-course-watcher/data
      - name: Commit latest report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            university-course-watcher/data/results.csv \
            university-course-watcher/data/results.json \
            university-course-watcher/data/report.html \
            university-course-watcher/data/graduate_admission_results.csv \
            university-course-watcher/data/graduate_admission_results.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update latest watcher reports [skip ci]"
            for attempt in 1 2 3; do
              git fetch origin "${GITHUB_REF_NAME}"
              git rebase -X theirs "origin/${GITHUB_REF_NAME}"
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying after remote refresh."
              sleep 2
            done
            echo "Failed to publish report files after 3 attempts."
            exit 1
          fi
      - name: Upload combined result artifacts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[full-run]')
        uses: actions/upload-artifact@v7
        with:
          name: university-course-watcher-results
          path: |
            university-course-watcher/data/results.csv
            university-course-watcher/data/results.json
            university-course-watcher/data/report.html
            university-course-watcher/data/graduate_admission_results.csv
            university-course-watcher/data/graduate_admission_results.json
